name: concentrao
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.10.1 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8 # Default icons for iOS-style (Cupertino) design
  get: ^4.7.3 # State management, navigation, and dependency injection framework
  device_preview: ^1.3.1 # Preview app on different device sizes and orientations
  flutter_screenutil: ^5.9.3 # Responsive screen and font size adaptation across devices
  flutter_svg: ^2.2.3 # Rendering and displaying SVG vector graphics
  icons_launcher: ^3.0.3 # Automated generation of launcher icons for Android and iOS
  smooth_page_indicator: ^2.0.1 # Animated page indicators for PageView/Carousels
  fl_chart: ^0.70.0 # Comprehensive library for creating charts like Line, Bar, and Pie charts
  image_picker: ^1.2.1

  aura: any
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

icons_launcher:
  image_path: "assets/images/app_icon_cropped.png"
  platforms:
    android:
      enable: true
    ios:
      enable: true

flutter:
  uses-material-design: true

  assets:
    - assets/icon/
    - assets/images/