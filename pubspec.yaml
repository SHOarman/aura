name: aura
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.10.1 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  get: ^4.7.3
  device_preview: ^1.3.1
  flutter_screenutil: ^5.9.3
  flutter_svg: ^2.2.3
  icons_launcher: ^3.0.3
  smooth_page_indicator: ^2.0.1
  fl_chart: ^0.70.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

icons_launcher:
  image_path: ""
  platforms:
    android:
      enable: true
    ios:
      enable: true

flutter:
  uses-material-design: true

  assets:
    - assets/icon/
    - assets/images/